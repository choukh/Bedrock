name: typecheck

on:
  push:
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Agda 2.8.0
        uses: agda/agda-setup-action@v1
        with:
          agda-version: '2.8.0'

      - name: Install and register cubical 0.9
        shell: bash
        run: |
          set -euo pipefail
          curl -fL https://github.com/agda/cubical/archive/refs/tags/v0.9.tar.gz -o cubical.tar.gz
          mkdir -p "${AGDA_DIR}/libraries.d"
          tar xf cubical.tar.gz -C "${AGDA_DIR}/libraries.d/"
          echo "${AGDA_DIR}/libraries.d/cubical-0.9/cubical.agda-lib" >> "${AGDA_DIR}/libraries"
          cat "${AGDA_DIR}/libraries"

      - name: Typecheck
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          files=(src/**/*.agda)
          if (( ${#files[@]} == 0 )); then
            echo "No Agda source files under src/ yet; nothing to typecheck."
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "::group::agda $f"
            agda "$f"
            echo "::endgroup::"
          done
