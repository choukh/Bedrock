version = 1

# Bedrock per-file licensing, machine-readable and enforced by `reuse lint` (see AGENTS.md).
# A single AGPL-3.0-only default covers the open-ended set of first-party code/config/dev-docs
# (so a newly added file inherits it automatically); a small, finite set of carve-outs overrides
# it for the mathematical development + user prose (CC), the third-party fonts (OFL), and the
# vendored 1lab tree (AGPL, upstream copyright). The three buckets are non-overlapping path
# prefixes. Full license texts: LICENSES/. Human summary: COPYRIGHT and NOTICE.

# ---- Default: everything is AGPL-3.0-only, first-party copyright -------------------
[[annotations]]
path = "**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Bedrock Institute"
SPDX-License-Identifier = "AGPL-3.0-only"

# ---- Vendored 1lab front-end: AGPL-3.0 (= default) with upstream copyright ---------
[[annotations]]
path = "site/vendor/1lab/**"
precedence = "override"
SPDX-FileCopyrightText = "2021 Amelia Liao and contributors"
SPDX-License-Identifier = "AGPL-3.0-only"

# ---- Carve-out: math + user prose + brand mark + user README -> CC BY-NC-SA 4.0 ----
[[annotations]]
path = ["src/**", "docs/**", "README.md", "site/static/assets/**"]
precedence = "override"
SPDX-FileCopyrightText = "2026 Bedrock Institute"
SPDX-License-Identifier = "CC-BY-NC-SA-4.0"

# ---- Carve-out: self-hosted third-party web fonts -> OFL-1.1 (per-font copyright) --
[[annotations]]
path = ["site/static/fonts/eb-garamond-*.woff2", "site/static/fonts/LICENSE-EBGaramond.txt"]
precedence = "override"
SPDX-FileCopyrightText = "2010-2013 Georg Duffner"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = ["site/static/fonts/inria-sans-*.woff2", "site/static/fonts/LICENSE-InriaSans.txt"]
precedence = "override"
SPDX-FileCopyrightText = "2017 The Inria Sans Project Authors"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = ["site/static/fonts/JuliaMono-*.woff2", "site/static/fonts/LICENSE-JuliaMono.txt"]
precedence = "override"
SPDX-FileCopyrightText = "2020-2023 cormullion"
SPDX-License-Identifier = "OFL-1.1"

# ---- Root copies of the license texts (duplicated so GitHub's detector lists all three;
#      it does not read LICENSES/). Mark each as the license it contains. ------------
[[annotations]]
path = "LICENSE-AGPL"
precedence = "override"
SPDX-FileCopyrightText = "Free Software Foundation, Inc."
SPDX-License-Identifier = "AGPL-3.0-only"

[[annotations]]
path = "LICENSE-CC-BY-NC-SA"
precedence = "override"
SPDX-FileCopyrightText = "Creative Commons"
SPDX-License-Identifier = "CC-BY-NC-SA-4.0"

[[annotations]]
path = "LICENSE-OFL"
precedence = "override"
SPDX-FileCopyrightText = "SIL International"
SPDX-License-Identifier = "OFL-1.1"
